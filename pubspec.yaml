name: autofill
description: A Flutter mobile app that stores family profile data and integrates with the Android Autofill Framework.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  # Drift for local SQLite + encryption
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  # SQLCipher for AES encryption at rest
  sqflite_sqlcipher: ^2.3.0+1
  # Secure key storage
  flutter_secure_storage: ^9.0.0
  # Biometric authentication
  local_auth: ^2.2.0
  # UUID generation
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Drift build runner for code generation
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
